<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // Redirect all 404s back to index.html preserving the path for client-side routing
    var l = window.location;
    var base = l.pathname.split('/').slice(0, 2).join('/'); // e.g. "/portfolio"
    var sub = l.pathname.split('/').slice(2).join('/');     // e.g. "work/western-digital"
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      base + '/?p=' + encodeURIComponent(sub + l.search) +
      (l.hash || '')
    );
  </script>
</head>
<body></body>
</html>
